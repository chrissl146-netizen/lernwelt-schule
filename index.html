<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaterialPool Holztechnik</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --border: #dcdcdc;
            --text: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); color: var(--text); line-height: 1.6; overflow: hidden; }
        .hidden { display: none !important; }

        /* Auth Screen */
        #auth-view { height: 100vh; display: flex; align-items: center; justify-content: center; background: #eef2f3; }
        .auth-box { background: var(--white); padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; }
        
        /* App Layout */
        #app-view { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background-color: var(--primary); color: var(--white); padding: 1.5rem; border-right: 1px solid rgba(255,255,255,0.1); }
        .main-content { display: flex; flex-direction: column; background: var(--bg-light); overflow-y: auto; }
        .topbar { background: var(--white); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .content-area { padding: 2rem; flex-grow: 1; }

        /* Buttons */
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; padding: 12px 20px; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background: var(--secondary); color: white; padding: 10px 15px; }
        .btn-text { background: transparent; color: var(--primary); text-decoration: underline; }

        /* Items */
        .folder-item { padding: 10px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; }
        .folder-item:hover { background: rgba(255,255,255,0.1); }
        .folder-item.active { background: var(--accent); }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .file-card { background: white; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: inherit; display: block; }
        
        .status-bar { background: #d1ecf1; color: #0c5460; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <!-- LOGIN / REGISTER -->
    <div id="auth-view">
        <div class="auth-box">
            <div id="login-section">
                <h2>MaterialPool Login</h2>
                <p style="margin-bottom: 1.5rem; font-size: 0.9rem;">Holztechnik & Pädagogik</p>
                <input type="email" id="login-email" placeholder="E-Mail">
                <input type="password" id="login-password" placeholder="Passwort">
                <button id="btn-do-login" class="btn-primary">Anmelden</button>
                <p>Neu hier? <span id="go-to-register" style="color:var(--accent); cursor:pointer;">Registrieren</span></p>
            </div>

            <div id="register-section" class="hidden">
                <h2>Konto erstellen</h2>
                <input type="text" id="reg-name" placeholder="Vollständiger Name">
                <input type="email" id="reg-email" placeholder="E-Mail">
                <input type="password" id="reg-password" placeholder="Passwort">
                <button id="btn-do-register" class="btn-primary">Registrieren</button>
                <p><span id="go-to-login" style="color:var(--accent); cursor:pointer;">Zurück zum Login</span></p>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-view" class="hidden">
        <aside class="sidebar">
            <h3 style="margin-bottom: 1rem;">Lernfelder</h3>
            <button id="btn-add-folder" class="btn-secondary" style="width:100%; margin-bottom: 1rem;">+ Fachbereich</button>
            <nav id="folder-list"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div id="path">Startseite</div>
                <div>
                    <span id="user-name" style="margin-right:1rem; font-weight:bold;">Benutzer</span>
                    <button id="btn-logout" class="btn-text">Abmelden</button>
                </div>
            </header>

            <section class="content-area">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="folder-title">Alle Materialien</h2>
                    <label class="btn-primary" style="width:auto; cursor:pointer;">
                        Datei hochladen
                        <input type="file" id="file-input" hidden>
                    </label>
                </div>
                <div id="upload-msg" class="status-bar hidden">Upload läuft...</div>
                <div id="file-display" class="file-grid"></div>
            </section>
        </main>
    </div>

    <!-- INITIAL NAME MODAL -->
    <div id="modal-name" class="modal hidden">
        <div style="background:white; padding:2rem; border-radius:8px; text-align:center;">
            <h3>Dein Name</h3>
            <p>Bitte gib deinen Namen für die Uploads an.</p>
            <input type="text" id="setup-name" placeholder="Vorname Nachname" style="margin-top:1rem;">
            <button id="btn-save-name" class="btn-primary">Speichern</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, getDoc, doc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

        // Aktualisierte Konfiguration für das Projekt holzquartett
        const firebaseConfig = {
            apiKey: "AIzaSyBizUZLZmAVC4P4jexOC-5ms51_37HIHcc",
            authDomain: "holzquartett-3a177.firebaseapp.com",
            projectId: "holzquartett-3a177",
            storageBucket: "holzquartett-3a177.firebasestorage.app",
            messagingSenderId: "1081595025073",
            appId: "1:1081595025073:web:ee5f27963e04516027f490",
            measurementId: "G-X6LZTG43XZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let userObj = null;
        let folderId = null;

        // Login & Registrierung
        document.getElementById('btn-do-login').onclick = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } 
            catch (err) { alert("Login fehlgeschlagen. Prüfe deine Daten oder ob E-Mail-Login in Firebase aktiviert ist."); }
        };

        document.getElementById('btn-do-register').onclick = async () => {
            const n = document.getElementById('reg-name').value;
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { name: n, email: e });
            } catch (err) { alert("Fehler bei der Registrierung: " + err.message); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                userObj = u;
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                
                const snap = await getDoc(doc(db, "users", u.uid));
                if (snap.exists()) {
                    document.getElementById('user-name').innerText = snap.data().name;
                } else {
                    document.getElementById('modal-name').classList.remove('hidden');
                }
                loadFolders();
                loadFiles(null);
            } else {
                document.getElementById('app-view').classList.add('hidden');
                document.getElementById('auth-view').classList.remove('hidden');
            }
        });

        document.getElementById('btn-save-name').onclick = async () => {
            const n = document.getElementById('setup-name').value;
            if (n) {
                await setDoc(doc(db, "users", userObj.uid), { name: n, email: userObj.email });
                document.getElementById('modal-name').classList.add('hidden');
                location.reload();
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // Ordner- und Dateiverwaltung
        async function loadFolders() {
            onSnapshot(collection(db, "folders"), (snap) => {
                const list = document.getElementById('folder-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const f = d.data();
                    const div = document.createElement('div');
                    div.className = 'folder-item';
                    div.innerText = "📁 " + f.name;
                    div.onclick = () => {
                        folderId = d.id;
                        document.getElementById('folder-title').innerText = f.name;
                        loadFiles(d.id);
                        document.querySelectorAll('.folder-item').forEach(i => i.classList.remove('active'));
                        div.classList.add('active');
                    };
                    list.appendChild(div);
                });
            });
        }

        document.getElementById('btn-add-folder').onclick = async () => {
            const n = prompt("Name des Fachbereichs (z.B. Massivholzbearbeitung):");
            if (n) await addDoc(collection(db, "folders"), { name: n, createdBy: userObj.uid });
        };

        async function loadFiles(fId) {
            const display = document.getElementById('file-display');
            display.innerHTML = "Wird geladen...";
            const q = fId ? query(collection(db, "files"), where("folderId", "==", fId)) : collection(db, "files");
            
            onSnapshot(q, (snap) => {
                display.innerHTML = snap.empty ? "Keine Dokumente in diesem Bereich." : "";
                snap.forEach(d => {
                    const f = d.data();
                    const card = document.createElement('a');
                    card.className = 'file-card';
                    card.href = f.url;
                    card.target = "_blank";
                    card.innerHTML = `<strong>${f.name}</strong><br><small>Bereitgestellt von: ${f.userName}</small>`;
                    display.appendChild(card);
                });
            });
        }

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !folderId) return alert("Wähle bitte zuerst einen Fachbereich in der linken Leiste aus!");

            const msg = document.getElementById('upload-msg');
            msg.classList.remove('hidden');

            try {
                const sRef = ref(storage, `files/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                const uSnap = await getDoc(doc(db, "users", userObj.uid));
                await addDoc(collection(db, "files"), {
                    name: file.name,
                    url: url,
                    folderId: folderId,
                    userName: uSnap.data().name,
                    createdAt: serverTimestamp()
                });
            } catch (err) {
                alert("Upload fehlgeschlagen. Prüfe die Storage-Regeln in Firebase.");
            }
            msg.classList.add('hidden');
        };

        // Navigation
        document.getElementById('go-to-register').onclick = () => {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.remove('hidden');
        };
        document.getElementById('go-to-login').onclick = () => {
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
        };
    </script>
</body>
</html>
